<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="	https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <title>Bootstrap</title>
</head>
<body>
    <!-- Row with 3 columns of equal space -->
    <div class="container">
        <div class="row">
            <div class="col">
                <h4 style="color: blue;">First Column</h4>
            </div>
            <div class="col">
                <h4 style="color: green;">Second Column</h4>
            </div>
            <div class="col">
                <h4 style="color: red;">Third Column</h4>
            </div>
        </div>
    </div>

    <!-- Row with 3 columns (sizes 2, 3, 7) -->
    <div class="container mt-4">
        <div class="row">
            <div class="col-2">
                <h4 style="color: blue;">Column (2)</h4>
            </div>
            <div class="col-3">
                <h4 style="color: green;">Column (3)</h4>
            </div>
            <div class="col-7">
                <h4 style="color: red;">Column (7)</h4>
            </div>
        </div>
    </div>
</body>
</html>
