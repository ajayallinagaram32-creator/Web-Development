<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ajay Allinagaram - Profile</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 500px;
            padding: 40px;
        }

        .profile-header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 3px solid #667eea;
            padding-bottom: 20px;
        }

        .profile-header h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .profession {
            color: #667eea;
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .details-section {
            margin-bottom: 20px;
        }

        .detail-item {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
            padding: 12px;
            background: #f8f9fa;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }

        .detail-label {
            color: #667eea;
            font-weight: 700;
            min-width: 100px;
            font-size: 14px;
        }

        .detail-value {
            color: #555;
            font-size: 15px;
            margin-left: 15px;
            word-break: break-all;
        }

        .icon {
            display: inline-block;
            margin-right: 10px;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="profile-header">
            <h1>Ajay Allinagaram</h1>
            <p class="profession">Senior Software Engineer</p>
        </div>

        <div class="details-section">
            <div class="detail-item">
                <span class="detail-label">📧 Email:</span>
                <span class="detail-value">ajayallinagaram9@gmail.com</span>
            </div>

            <div class="detail-item">
                <span class="detail-label">📱 Phone:</span>
                <span class="detail-value">7032042111</span>
            </div>

            <div class="detail-item">
                <span class="detail-label">📍 Location:</span>
                <span class="detail-value">Andhra Pradesh, India</span>
            </div>
        </div>
    </div>
</body>
</html>
