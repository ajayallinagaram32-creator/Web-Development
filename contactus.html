<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <style>
        body{font-family:Arial, Helvetica, sans-serif;background:#f7f9fc;margin:0;padding:20px;display:flex;align-items:center;justify-content:center;min-height:100vh}
        .container{background:#fff;padding:24px;border-radius:8px;box-shadow:0 6px 18px rgba(0,0,0,0.08);max-width:600px;width:100%}
        h1{margin-top:0;font-size:1.5rem}
        .form-row{display:flex;gap:12px}
        /* Ensure column children share space and allow gap fallback for older browsers */
        .form-row > div{flex:1;min-width:0}
        /* Fallback spacing for browsers that don't support gap on flex containers */
        .form-row > div + div{margin-left:12px}
        @media(max-width:600px){
            .form-row{flex-direction:column}
            .form-row > div + div{margin-left:0}
        }
        label{display:block;font-weight:600;margin-bottom:6px;font-size:0.9rem}
        input[type=text],input[type=email],select,textarea{width:100%;padding:10px;border:1px solid #dbe4ef;border-radius:6px;font-size:1rem}
        textarea{min-height:120px;resize:vertical}
        button{background:#1e88e5;color:#fff;border:none;padding:10px 16px;border-radius:6px;font-size:1rem;cursor:pointer}
        button:hover{background:#1669b3}
        .required{color:#d93025;margin-left:4px}
        .small{font-size:0.9rem;color:#6b7280;margin-top:8px}
    </style>
</head>
<body>
    <div class="container">
        <h1>Contact Us</h1>
        <form action="#" method="post" id="contactForm" novalidate>
            <div class="form-row">
                <div style="flex:1">
                    <label for="name">Name <span class="required">*</span></label>
                    <input type="text" id="name" name="name" placeholder="Your full name" required>
                </div>
                <div style="flex:1">
                    <label for="email">Email <span class="required">*</span></label>
                    <input type="email" id="email" name="email" placeholder="you@example.com" required>
                </div>
            </div>

            <label for="course">Course</label>
            <select id="course" name="course">
                <option value="">Select a course</option>
                <option>Web Development</option>
                <option>Data Science</option>
                <option>Mobile Development</option>
                <option>UI/UX Design</option>
                <option>Other</option>
            </select>

            <label for="message">Message <span class="required">*</span></label>
            <textarea id="message" name="message" placeholder="Write your message here" required></textarea>

            <div style="margin-top:12px;display:flex;gap:12px;align-items:center;flex-wrap:wrap">
                <button type="submit">Send Message</button>
                <p class="small">We'll respond within 2 business days.</p>
            </div>
        </form>
    </div>

    <script>
        document.getElementById('contactForm').addEventListener('submit', function(e){
            if(!this.checkValidity()){
                e.preventDefault();
                this.reportValidity();
            }
        });
    </script>
</body>
</html>
