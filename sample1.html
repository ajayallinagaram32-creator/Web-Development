<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* Color classes */
        .primary { color: #0d6efd; }
        .success { color: #198754; }
        .danger { color: #dc3545; }
        .muted { color: #6c757d; }
        .bg-light { background-color: #f8f9fa; padding: 0.75rem; border-radius: 4px; }
        .text-white { color: #fff; }
        .bg-primary { background-color: #0d6efd; color: #fff; padding: 0.45rem 0.75rem; border-radius: 4px; display: inline-block; }
    </style>
</head>
<body>
    <header>
        <h1 class="primary">Sample Page</h1>
        <p class="muted">This demonstrates reusable color classes.</p>
    </header>

    <main>
        <section>
            <p class="success">Success text example.</p>
            <p><span class="danger">Danger!</span> <button class="bg-primary">Primary Button</button></p>
            <div class="bg-light">Block with light background.</div>
        </section>
    </main>

    <footer>
        <small class="muted">Footer - muted text</small>
    </footer>
</body>
</html>
