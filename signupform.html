<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup Form</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow: hidden;
        }
        
        .container {
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 450px;
            padding: 40px;
            max-height: 90vh;
            overflow-y: auto;
        }
        
        .form-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .form-header h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
        }
        
        .form-header p {
            color: #666;
            font-size: 14px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }
        
        input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            font-family: Arial, sans-serif;
            transition: border-color 0.3s;
        }
        
        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.1);
        }
        
        .password-container {
            position: relative;
        }
        
        .toggle-password {
            position: absolute;
            right: 12px;
            top: 40px;
            cursor: pointer;
            color: #667eea;
            font-size: 18px;
            user-select: none;
        }
        
        .form-group input[type="password"] {
            padding-right: 40px;
        }
        
        .password-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        
        .password-group .form-group {
            margin-bottom: 0;
        }
        
        .submit-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 10px;
        }
        
        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        
        .submit-btn:active {
            transform: translateY(0);
        }
        
        .login-link {
            text-align: center;
            margin-top: 20px;
            color: #666;
            font-size: 14px;
        }
        
        .login-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }
        
        .login-link a:hover {
            text-decoration: underline;
        }
        
        .error-message {
            color: #d32f2f;
            font-size: 12px;
            margin-top: 5px;
            display: none;
        }
        
        input:invalid:not(:placeholder-shown) ~ .error-message {
            display: block;
        }
        
        @media (max-width: 480px) {
            .container {
                padding: 30px 20px;
            }
            
            .form-header h1 {
                font-size: 24px;
            }
            
            .password-group {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="form-header">
            <h1>Create Account</h1>
            <p>Join us today and get started</p>
        </div>
        
        <form id="signupForm" onsubmit="validateForm(event)">
            <!-- Full Name Field -->
            <div class="form-group">
                <label for="fullname">Full Name <span style="color: red;">*</span></label>
                <input 
                    type="text" 
                    id="fullname" 
                    name="fullname" 
                    placeholder="Enter your full name"
                    required
                    minlength="3"
                >
            </div>
            
            <!-- Email Field -->
            <div class="form-group">
                <label for="email">Email Address <span style="color: red;">*</span></label>
                <input 
                    type="email" 
                    id="email" 
                    name="email" 
                    placeholder="Enter your email"
                    required
                >
            </div>
            
            <!-- Mobile Field -->
            <div class="form-group">
                <label for="mobile">Mobile Number <span style="color: red;">*</span></label>
                <input 
                    type="tel" 
                    id="mobile" 
                    name="mobile" 
                    placeholder="Enter your mobile number"
                    pattern="[0-9]{10}"
                    required
                >
                <small style="color: #999; margin-top: 3px; display: block;">10 digit number</small>
            </div>
            
            <!-- Password Fields -->
            <div class="password-group">
                <div class="form-group password-container">
                    <label for="password">Password <span style="color: red;">*</span></label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        placeholder="Enter password"
                        required
                        minlength="6"
                    >
                    <span class="toggle-password" onclick="togglePassword('password')">👁️</span>
                </div>
                
                <div class="form-group password-container">
                    <label for="confirmPassword">Confirm Password <span style="color: red;">*</span></label>
                    <input 
                        type="password" 
                        id="confirmPassword" 
                        name="confirmPassword" 
                        placeholder="Confirm password"
                        required
                        minlength="6"
                    >
                    <span class="toggle-password" onclick="togglePassword('confirmPassword')">👁️</span>
                </div>
            </div>
            
            <!-- Submit Button -->
            <button type="submit" class="submit-btn">Sign Up</button>
            
            <!-- Login Link -->
            <div class="login-link">
                Already have an account? <a href="login.html">Login here</a>
            </div>
        </form>
    </div>
    
    <script>
        function togglePassword(fieldId) {
            const field = document.getElementById(fieldId);
            const type = field.type === 'password' ? 'text' : 'password';
            field.type = type;
        }
        
        function validateForm(event) {
            event.preventDefault();
            
            const fullname = document.getElementById('fullname').value.trim();
            const email = document.getElementById('email').value.trim();
            const mobile = document.getElementById('mobile').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            // Validate name
            if (fullname.length < 3) {
                alert('Name must be at least 3 characters long');
                return;
            }
            
            // Validate mobile
            if (mobile.length !== 10 || isNaN(mobile)) {
                alert('Mobile number must be 10 digits');
                return;
            }
            
            // Validate password match
            if (password !== confirmPassword) {
                alert('Passwords do not match');
                return;
            }
            
            // Validate password length
            if (password.length < 6) {
                alert('Password must be at least 6 characters long');
                return;
            }
            
            // If all validations pass
            alert('Form submitted successfully!\n\nName: ' + fullname + '\nEmail: ' + email + '\nMobile: ' + mobile);
            // Here you would typically send the data to a server
            // document.getElementById('signupForm').submit();
        }
    </script>
</body>
</html>
